server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: timelocusbackend

  # ── MySQL Configuration ───────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/timelocus_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root                    # your MySQL username
    password: Harshal@114!     # your MySQL root password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update                # auto creates/updates tables
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Mail (for password reset) ─────────────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: TimeLocus-Super-Secret-Key-2024-Min-256-Bits-Change-In-Prod
  expiration: 86400000
  refresh-expiration: 604800000

# ── AI Configuration ──────────────────────────────────────────────────────────
ai:
  provider: groq
  groq:
    api-key: your-groq-api-key        # free at console.groq.com
    base-url: https://api.groq.com/openai/v1
    model: llama3-8b-8192
  openai:
    api-key: your-openai-key
    base-url: https://api.openai.com/v1
    model: gpt-4o-mini

# ── CORS ──────────────────────────────────────────────────────────────────────
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.timeLocus: DEBUG
    org.springframework.security: INFO

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html