server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: timelocusbackend

  datasource:
    url: jdbc:mysql://localhost:3306/timelocus_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Harshal@114!     # ← change this when you are runnninf locally on your pc // this is your mysql password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: TimeLocus-Super-Secret-Key-2024-Min-256-Bits-Change-In-Prod
  expiration: 86400000
  refresh-expiration: 604800000

# ── AI Configuration ──────────────────────────────────────────────────────────
# Set provider to 'ollama' for local free AI, or 'groq' for cloud AI
ai:
  provider: ollama                    # ← 'ollama' (local/free) or 'groq' (cloud/free)

  # Ollama — runs on your PC, completely free forever
  # Setup: 1) Download from ollama.com
  #        2) Run: ollama pull phi3:mini
  #        3) Run: ollama serve
  #        4) Ollama runs at localhost:11434 automatically
  ollama:
    base-url: http://localhost:11434
    model: qwen2.5-coder:3b #phi3:mini                  # ← 2.3GB, good for 4-6GB RAM
    # Other options by RAM:
    # tinyllama    → 637MB  (very fast, basic quality)
    # phi3:mini    → 2.3GB  (recommended for 4-6GB RAM)
    # llama3.2:1b  → 1.3GB  (good balance)
    # llama3.2:3b  → 2.0GB  (better quality)
    # llama3       → 4.7GB  (best quality, needs 8GB RAM)

  # Groq — free cloud AI, used as fallback if Ollama is offline
  # Get free API key at: console.groq.com (any email, no credit card)
  groq:
    api-key: ""                       # ← optional: add Groq key as fallback
    base-url: https://api.groq.com/openai/v1
    model: llama3-8b-8192

  # OpenAI — paid
  openai:
    api-key: ""
    base-url: https://api.openai.com/v1
    model: gpt-4o-mini

# ── CORS ──────────────────────────────────────────────────────────────────────
cors:
  allowed-origins:
    - http://localhost:3000
    - http://117.99.242.83:3000  # Replace with your PC's WiFi IP:3000
    - http://*:3000              # Wildcard subnet if dynamic IP

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.timeLocus: DEBUG
    org.springframework.security: INFO

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html